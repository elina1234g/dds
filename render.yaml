services:
  - type: web
    name: dds-finance
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/dds.db
    disk:
      name: dds-data
      mountPath: /data
      sizeGB: 1
